<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кинокритик — Регистрация</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <a href="s.html"><img src="img/logo.png" alt="Логотип Кинокритик"></a>
        </div>
        <button class="mobile-menu-btn" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links">
            <a href="films.html">Фильмы</a>
            <a href="news.html">Новости</a>
            <a href="rating.html">Рейтинг</a>
            <a href="admin.html">Админ</a>
        </div>
        <a class="login-btn" href="auth.html">
            Профиль
            <img src="img/user.png" alt="" class="user-icon">
        </a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
            const navLinks = document.querySelector('.nav-links');
            
            if (mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenuBtn.classList.toggle('active');
                    navLinks.classList.toggle('active');
                });
                
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.addEventListener('click', () => {
                        mobileMenuBtn.classList.remove('active');
                        navLinks.classList.remove('active');
                    });
                });
            }
        });
    </script>

    <main class="auth-page auth-page--reg">
        <section class="auth-form-block auth-form-block--reg">
            <h2 class="auth-form-title">Регистрация</h2>
            <form class="auth-form" id="registerForm">
                <div class="auth-field">
                    <label class="auth-label">Логин</label>
                    <input type="text" class="auth-input" placeholder="" required>
                </div>
                <div class="auth-field">
                    <label class="auth-label">Почта</label>
                    <input type="email" class="auth-input" placeholder="" required>
                </div>
                <div class="auth-field">
                    <label class="auth-label">Пароль</label>
                    <input type="password" class="auth-input" placeholder="" required>
                </div>
                <div class="auth-field auth-field--checkbox">
                    <label class="auth-checkbox-label">
                        <input type="checkbox" class="auth-checkbox" required>
                        <span>Согласие на обработку персональных данных</span>
                    </label>
                </div>
                <div class="auth-buttons auth-buttons--reg">
                    <button type="submit" class="auth-btn auth-btn--primary auth-btn--full">Войти</button>
                    
                </div>
            </form>
        </section>
    </main>

    <footer class="footer">
        <div class="footer-logo">
            <img src="img/logo.png" alt="Кинокритик">
        </div>
        <div class="footer-columns">
            <div class="footer-column">
                <h3 class="footer-title">Разделы</h3>
                <div class="footer-links">
                    <a href="films.html">Фильмы</a>
                    <a href="news.html">Новости</a>
                    <a href="rating.html">Рейтинг</a>
                </div>
            </div>
            <div class="footer-columnn">
                <h3 class="footer-title">Политика конфиденциальности</h3>
                <div class="icons">
                    <a href="#"><img src="img/watsapp.png" alt="WhatsApp"></a>
                    <a href="#"><img src="img/VK.png" alt="VK"></a>
                    <a href="#"><img src="img/tg.png" alt="Telegram"></a>
                </div>
            </div>
            <div class="footer-column footer-socials"></div>
        </div>
    </footer>

    <script>
        document.getElementById("registerForm").addEventListener("submit", (e) => {
            e.preventDefault();
            alert("Регистрация выполнена (демо)");
            window.location.href = "auth.html";
        });
    </script>
</body>
</html>
