<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кинокритик — Чат</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">
            <a href="s.html"><img src="img/logo.png" alt="Логотип Кинокритик"></a>
        </div>
        <button class="mobile-menu-btn" aria-label="Меню">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="nav-links">
            <a href="films.html">Фильмы</a>
            <a href="news.html">Новости</a>
            <a href="rating.html">Рейтинг</a>
            <a href="admin.html">Админ</a>
        </div>
        <a class="login-btn" href="profil.html">
            Профиль
            <img src="img/user.png" alt="" class="user-icon">
        </a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const mobileMenuBtn = document.querySelector('.mobile-menu-btn');
            const navLinks = document.querySelector('.nav-links');
            
            if (mobileMenuBtn) {
                mobileMenuBtn.addEventListener('click', () => {
                    mobileMenuBtn.classList.toggle('active');
                    navLinks.classList.toggle('active');
                });
                
                document.querySelectorAll('.nav-links a').forEach(link => {
                    link.addEventListener('click', () => {
                        mobileMenuBtn.classList.remove('active');
                        navLinks.classList.remove('active');
                    });
                });
            }
        });
    </script>

    <main class="myrating-page">
        <h1 class="myrating-title">Чат</h1>

        <div class="chat-toolbar">
            <div class="chat-toolbar-left">
                <span class="chat-toolbar-tab chat-toolbar-tab--active">Профиль</span>
                <span class="chat-toolbar-tab">Друзья</span>
            </div>
            <div class="chat-toolbar-right">
                <input id="chatSearch" class="chat-search-input" type="text" placeholder="Поиск">
            </div>
        </div>

        <div class="chat-layout">
            <aside class="chat-users" aria-label="Пользователи">
                <div class="chat-users-title">Пользователи</div>
                <div id="chatUsersList" class="chat-users-list"></div>
            </aside>

            <div class="chat-box">
                <div class="chat-header">
                    <div class="chat-with">Чат</div>
                    <div id="chatWithName" class="chat-with-name">Выбери пользователя слева</div>
                </div>
                <div class="chat-messages" id="chatMessages"></div>
                <form id="chatForm" class="chat-form">
                    <input id="chatInput" class="chat-input" type="text" placeholder="Сообщение..." disabled>
                    <button id="chatSendBtn" class="chat-send" type="submit" disabled>Отправить</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="footer-logo">
            <img src="img/logo.png" alt="Кинокритик">
        </div>
        <div class="footer-columns">
            <div class="footer-column">
                <h3 class="footer-title">Разделы</h3>
                <div class="footer-links">
                    <a href="films.html">Фильмы</a>
                    <a href="news.html">Новости</a>
                    <a href="rating.html">Рейтинг</a>
                </div>
            </div>
             <div class="footer-columnn">
                <h3 class="footer-title">Политика конфиденциальности</h3>
                <div class="icons">
                <a href="#"><img src="img/watsapp.png" alt="WhatsApp"></a>
                <a href="#"><img src="img/VK.png" alt="VK"></a>
                <a href="#"><img src="img/tg.png" alt="Telegram"></a>
                </div>
            </div>
            <div class="footer-column footer-socials">
                
            </div>
    </footer>

    <script>
        const CHAT_USERS = [
            { id: "user1", name: "Пользователь 1" },
            { id: "user2", name: "Пользователь 2" },
            { id: "user3", name: "Пользователь 3" }
        ];

        function getBannedUsers() {
            const raw = localStorage.getItem("banned_users");
            return raw ? JSON.parse(raw) : {};
        }

        const DEFAULT_CHATS = {
            user1: [
                {
                    from: "me",
                    text: "привет как тебе фильм «Аватар»? мне он очень понравился",
                    at: Date.now()
                },
                {
                    from: "them",
                    text: "привет, мне фильм тоже понравился — 5 звёзд",
                    at: Date.now()
                }
            ]
        };

        function getChats() {
            const raw = localStorage.getItem("chats");
            const parsed = raw ? JSON.parse(raw) : {};
            return Object.keys(parsed).length ? parsed : DEFAULT_CHATS;
        }

        function setChats(chats) {
            localStorage.setItem("chats", JSON.stringify(chats));
        }

        const chatUsersListEl = document.getElementById("chatUsersList");
        const chatMessagesEl = document.getElementById("chatMessages");
        const chatWithNameEl = document.getElementById("chatWithName");
        const chatInputEl = document.getElementById("chatInput");
        const chatSendBtnEl = document.getElementById("chatSendBtn");
        const chatSearchEl = document.getElementById("chatSearch");

        let activeChatUserId = null;
        let chatSearchValue = "";

        function makeSystemMessage(text) {
            const msg = document.createElement("div");
            msg.className = "chat-message chat-message--system";
            msg.textContent = text;
            return msg;
        }

        function makeMeMessage(text, index) {
            const wrap = document.createElement("div");
            wrap.className = "chat-message-wrap chat-message-wrap--me";

            const msg = document.createElement("div");
            msg.className = "chat-message chat-message--me";
            msg.textContent = text;

            const delBtn = document.createElement("button");
            delBtn.className = "chat-message-delete-btn";
            delBtn.type = "button";
            delBtn.textContent = "+";
            delBtn.title = "Удалить сообщение";
            delBtn.addEventListener("click", () => deleteMyMessage(index));

            wrap.appendChild(msg);
            wrap.appendChild(delBtn);
            return wrap;
        }

        function makeThemMessage(text) {
            const msg = document.createElement("div");
            msg.className = "chat-message chat-message--them";
            msg.textContent = text;
            return msg;
        }

        function renderChatUsers() {
            chatUsersListEl.innerHTML = "";
            const search = chatSearchValue.trim().toLowerCase();
            const banned = getBannedUsers();
            CHAT_USERS.forEach(u => {
                if (search && !u.name.toLowerCase().includes(search)) return;
                const isBanned = !!banned[u.id];
                const row = document.createElement("div");
                row.className = "chat-user" + (u.id === activeChatUserId ? " is-active" : "") + (isBanned ? " is-banned" : "");
                row.innerHTML = `
                    <div class="chat-user-avatar" aria-hidden="true"></div>
                    <div class="chat-user-name">${u.name}${isBanned ? " <span class=\"chat-user-banned-badge\">Забанен</span>" : ""}</div>
                    <button class="chat-user-write" type="button" data-user="${u.id}" ${isBanned ? "disabled" : ""}>Написать</button>
                `;
                chatUsersListEl.appendChild(row);
            });
        }

        function deleteMyMessage(index) {
            if (!activeChatUserId) return;
            const chats = getChats();
            const history = chats[activeChatUserId] || [];
            if (history[index] && history[index].from === "me") {
                history.splice(index, 1);
                chats[activeChatUserId] = history;
                setChats(chats);
                renderChatMessages();
            }
        }

        function renderChatMessages() {
            chatMessagesEl.innerHTML = "";

            if (!activeChatUserId) {
                chatMessagesEl.appendChild(makeSystemMessage("Выбери пользователя и начни переписку."));
                return;
            }

            const banned = getBannedUsers();
            if (banned[activeChatUserId]) {
                chatMessagesEl.appendChild(makeSystemMessage("Пользователь забанен. Причина: " + (banned[activeChatUserId].reason || "—")));
                chatInputEl.disabled = true;
                chatSendBtnEl.disabled = true;
                return;
            }

            const chats = getChats();
            const history = chats[activeChatUserId] || [];
            if (history.length === 0) {
                chatMessagesEl.appendChild(makeSystemMessage("Напиши первое сообщение ниже."));
                return;
            }

            history.forEach((m, index) => {
                if (m.from === "me") chatMessagesEl.appendChild(makeMeMessage(m.text, index));
                else chatMessagesEl.appendChild(makeThemMessage(m.text));
            });
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        }

        function setActiveChatUser(userId) {
            activeChatUserId = userId;
            const user = CHAT_USERS.find(u => u.id === userId);
            chatWithNameEl.textContent = user ? user.name : "Чат";
            chatInputEl.disabled = !userId;
            chatSendBtnEl.disabled = !userId;
            renderChatUsers();
            renderChatMessages();
            if (userId) chatInputEl.focus();
        }

        chatUsersListEl.addEventListener("click", (e) => {
            const btn = e.target.closest(".chat-user-write");
            if (!btn || btn.disabled) return;
            setActiveChatUser(btn.dataset.user);
        });

        if (chatSearchEl) {
            chatSearchEl.addEventListener("input", (e) => {
                chatSearchValue = e.target.value || "";
                renderChatUsers();
            });
        }

        document.getElementById("chatForm").addEventListener("submit", (e) => {
            e.preventDefault();
            if (!activeChatUserId) return;
            const text = chatInputEl.value.trim();
            if (!text) return;

            const chats = getChats();
            const history = chats[activeChatUserId] || [];
            history.push({ from: "me", text, at: Date.now() });
            chats[activeChatUserId] = history;
            setChats(chats);

            const newIndex = history.length - 1;
            chatMessagesEl.appendChild(makeMeMessage(text, newIndex));
            chatInputEl.value = "";
            chatMessagesEl.scrollTop = chatMessagesEl.scrollHeight;
        });

        renderChatUsers();
        renderChatMessages();
    </script>
</body>
</html>
